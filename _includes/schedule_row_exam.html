<div class="col col-1" style="color:#ef4444; font-weight:bold;" data-label="Event">Exam</div>
<div class="col col-1-2" style="font-weight:bold;" data-label="Date">
    {% if include.event.end_date %}
        {{ include.event.date | date: site.dateformat }} – {{ include.event.end_date | date: site.dateformat }}
    {% else %}
        {{ include.event.date | date: site.dateformat }}
        <br class="date-spliter"/>{{ include.event.date | date: "%A" }}
    {% endif %}
</div>
<div class="col col-2" style="font-weight:bold;" data-label="Description">
    <a href="{{ include.event.url | prepend: site.baseurl }}" style="color:inherit; text-decoration:none;">
        {{ include.event.description }}
    </a>
</div>
<div class="col col-res" data-label="Resources">
    <a href="{{ include.event.url | prepend: site.baseurl }}" title="View event details" style="display:inline-block;">
        <i class="fas fa-file-alt"></i> Details
    </a>
</div>
