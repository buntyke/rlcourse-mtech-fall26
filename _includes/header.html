  <canvas id="rl-graph-canvas" style="position:absolute;top:0;left:0;right:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>
  <script>
  (function () {
    var canvas = document.getElementById('rl-graph-canvas');
    var ctx = canvas.getContext('2d');
    var W, H;

    function resize() {
      W = canvas.width  = canvas.parentElement.offsetWidth;
      H = canvas.height = canvas.parentElement.offsetHeight;
    }

    // 3 floating graph clusters — each has local node coords + a drifting centre
    var clusters = [
      {
        nodes: [{x:0,y:0},{x:38,y:-22},{x:58,y:12},{x:28,y:40},{x:-14,y:24}],
        edges: [[0,1],[1,2],[2,3],[3,4],[4,0],[0,2]],
        cx: 90, cy: 38, vx: 0.26, vy: 0.13
      },
      {
        nodes: [{x:0,y:-30},{x:28,y:0},{x:0,y:30},{x:-28,y:0},{x:14,y:-15}],
        edges: [[0,1],[1,2],[2,3],[3,0],[0,4],[4,1]],
        cx: 380, cy: 48, vx: -0.19, vy: 0.21
      },
      {
        nodes: [{x:0,y:0},{x:32,y:-18},{x:62,y:2},{x:48,y:28},{x:16,y:26}],
        edges: [[0,1],[1,2],[2,3],[3,4],[4,0],[1,3]],
        cx: 680, cy: 28, vx: 0.22, vy: -0.16
      }
    ];

    var t = 0;

    function draw() {
      ctx.clearRect(0, 0, W, H);
      t += 0.018;

      clusters.forEach(function (c) {
        c.cx += c.vx;
        c.cy += c.vy;
        if (c.cx >  W + 90) c.cx = -90;
        else if (c.cx < -90) c.cx =  W + 90;
        if (c.cy >  H + 50) c.cy = -50;
        else if (c.cy < -50) c.cy =  H + 50;

        // edges
        ctx.strokeStyle = 'rgba(255,255,255,0.22)';
        ctx.lineWidth = 1;
        c.edges.forEach(function (e) {
          var a = c.nodes[e[0]], b = c.nodes[e[1]];
          ctx.beginPath();
          ctx.moveTo(c.cx + a.x, c.cy + a.y);
          ctx.lineTo(c.cx + b.x, c.cy + b.y);
          ctx.stroke();
        });

        // nodes — subtle size pulse per node
        c.nodes.forEach(function (n, i) {
          var r = 3 + Math.sin(t + i * 1.3) * 0.9;
          ctx.beginPath();
          ctx.arc(c.cx + n.x, c.cy + n.y, r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,0.45)';
          ctx.fill();
        });
      });

      requestAnimationFrame(draw);
    }

    resize();
    window.addEventListener('resize', resize);
    draw();
  })();
  </script>

</header>
